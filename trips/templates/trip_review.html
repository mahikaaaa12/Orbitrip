<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Orbitrip — Trip Page</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
<style>
/* ===== TOKENS ===== */
:root {
  --bg: #0a0d14;
  --surface: #111520;
  --surface2: #181d2e;
  --surface3: #1e2438;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --accent: #f5a623;
  --accent2: #ff6b35;
  --teal: #00d4aa;
  --teal-dim: rgba(0,212,170,0.12);
  --text: #e8eaf0;
  --muted: #6b7290;
  --muted2: #4a4f68;
  --font-display: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 24px;
  --glass: rgba(24,29,46,0.72);
  --glass-border: rgba(255,255,255,0.08);
}

/* ===== RESET ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== BACKGROUND MESH ===== */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 60% 50% at 15% 10%, rgba(0,212,170,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 85% 80%, rgba(245,166,35,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 70% 20%, rgba(255,107,53,0.04) 0%, transparent 55%);
}

/* ===== GRID OVERLAY ===== */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
  background-size: 48px 48px;
}

/* ===== LAYOUT ===== */
.page-wrapper { position: relative; z-index: 1; max-width: 1120px; margin: 0 auto; padding: 0 24px 80px; }

/* ===== TOP NAV ===== */
.topnav {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 24px;
  background: rgba(10,13,20,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.topnav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.brand-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: linear-gradient(135deg, var(--teal), var(--accent));
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-weight: 800; font-size: 14px; color: #000;
}
.brand-name { font-family: var(--font-display); font-weight: 700; font-size: 17px; color: var(--text); }
.topnav-actions { display: flex; align-items: center; gap: 10px; }

/* ===== MODE BADGE ===== */
.mode-badge {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
  border: 1px solid; cursor: default; user-select: none;
}
.mode-badge.owner { background: rgba(0,212,170,0.1); border-color: rgba(0,212,170,0.3); color: var(--teal); }
.mode-badge.public { background: rgba(107,114,144,0.15); border-color: rgba(107,114,144,0.3); color: var(--muted); }
.mode-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

/* ===== BUTTONS ===== */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 8px 16px; border-radius: var(--r-md); border: 1px solid; font-family: var(--font-body);
  font-size: 13px; font-weight: 500; cursor: pointer; transition: all .18s ease; text-decoration: none;
  white-space: nowrap;
}
.btn-ghost { background: transparent; border-color: var(--border2); color: var(--muted); }
.btn-ghost:hover { border-color: rgba(255,255,255,0.2); color: var(--text); background: rgba(255,255,255,0.04); }
.btn-accent { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
.btn-accent:hover { background: #fbb93a; box-shadow: 0 0 20px rgba(245,166,35,0.25); }
.btn-teal { background: rgba(0,212,170,0.12); border-color: rgba(0,212,170,0.3); color: var(--teal); }
.btn-teal:hover { background: rgba(0,212,170,0.2); box-shadow: 0 0 16px rgba(0,212,170,0.15); }
.btn-danger { background: rgba(255,107,53,0.1); border-color: rgba(255,107,53,0.3); color: var(--accent2); }
.btn-danger:hover { background: rgba(255,107,53,0.18); }
.btn svg { width: 15px; height: 15px; flex-shrink: 0; }

/* ===== TOGGLE SWITCH ===== */
.toggle-wrap { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
.toggle { position: relative; width: 40px; height: 22px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute; cursor: pointer; inset: 0;
  background: var(--surface3); border-radius: 22px; border: 1px solid var(--border2);
  transition: .2s;
}
.toggle-slider::before {
  content: ''; position: absolute; height: 16px; width: 16px;
  left: 2px; top: 2px; background: var(--muted);
  border-radius: 50%; transition: .2s;
}
.toggle input:checked + .toggle-slider { background: rgba(0,212,170,0.2); border-color: rgba(0,212,170,0.4); }
.toggle input:checked + .toggle-slider::before { transform: translateX(18px); background: var(--teal); }

/* ===== HERO SECTION ===== */
.hero {
  position: relative; padding: 56px 0 40px; overflow: hidden;
}
.hero-cover {
  width: 100%; height: 320px; border-radius: var(--r-xl); overflow: hidden;
  margin-bottom: 32px; position: relative;
  border: 1px solid var(--border);
}
.hero-cover-img {
  width: 100%; height: 100%; object-fit: cover;
  filter: brightness(0.7) saturate(0.8);
}
.hero-cover-placeholder {
  width: 100%; height: 100%;
  background: linear-gradient(135deg, var(--surface2) 0%, var(--surface3) 50%, #0f1628 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 80px; opacity: 0.3;
}
.hero-cover-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(10,13,20,0.9) 0%, transparent 50%);
}
.hero-cover-actions {
  position: absolute; top: 16px; right: 16px; display: flex; gap: 8px;
}

.trip-meta-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
.trip-title-col { flex: 1; min-width: 0; }
.trip-title {
  font-family: var(--font-display); font-weight: 800; font-size: clamp(26px, 4vw, 42px);
  line-height: 1.1; color: var(--text); margin-bottom: 10px;
  background: linear-gradient(135deg, var(--text) 0%, rgba(232,234,240,0.7) 100%);
  -webkit-background-clip: text; background-clip: text;
}
.trip-tagline { color: var(--muted); font-size: 15px; margin-bottom: 16px; }
.trip-creator-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.avatar {
  width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--border2);
  background: linear-gradient(135deg, var(--teal), var(--accent));
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-size: 12px; font-weight: 700; color: #000;
  flex-shrink: 0;
}
.creator-name { font-size: 13px; color: var(--muted); }
.creator-name strong { color: var(--text); }
.pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500;
  background: var(--surface2); border: 1px solid var(--border);
}
.pill-teal { color: var(--teal); border-color: rgba(0,212,170,0.2); background: rgba(0,212,170,0.07); }
.pill-accent { color: var(--accent); border-color: rgba(245,166,35,0.2); background: rgba(245,166,35,0.07); }

/* ===== STATS STRIP ===== */
.stats-strip {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px; margin: 32px 0;
}
.stat-card {
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: var(--r-lg); padding: 16px 18px;
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
}
.stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
.stat-value { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--text); }
.stat-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
.stat-icon { font-size: 18px; margin-bottom: 8px; }

/* ===== SHARE BAR ===== */
.share-bar {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 16px 20px;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  margin-bottom: 32px;
}
.share-label { font-size: 12px; color: var(--muted); font-weight: 500; white-space: nowrap; }
.share-url-wrap { flex: 1; min-width: 180px; display: flex; align-items: center; gap: 8px; }
.share-url-input {
  flex: 1; background: var(--surface3); border: 1px solid var(--border2);
  border-radius: var(--r-sm); padding: 8px 12px; color: var(--muted);
  font-family: var(--font-body); font-size: 12px; outline: none;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.share-socials { display: flex; gap: 8px; }
.social-btn {
  width: 34px; height: 34px; border-radius: var(--r-sm); border: 1px solid var(--border2);
  background: var(--surface3); display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .15s; color: var(--muted);
  text-decoration: none;
}
.social-btn:hover { border-color: var(--border2); background: var(--surface2); color: var(--text); }
.social-btn svg { width: 15px; height: 15px; }

/* ===== MAIN GRID ===== */
.main-grid {
  display: grid; grid-template-columns: 1fr 320px; gap: 28px; align-items: start;
}
@media (max-width: 860px) { .main-grid { grid-template-columns: 1fr; } }

/* ===== SECTION HEADINGS ===== */
.section-title {
  font-family: var(--font-display); font-size: 13px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .1em; color: var(--muted);
  display: flex; align-items: center; gap: 8px; margin-bottom: 20px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ===== TIMELINE ===== */
.timeline { position: relative; }

/* city group */
.city-group { margin-bottom: 40px; }
.city-header {
  display: flex; align-items: center; gap: 14px; margin-bottom: 20px;
  padding: 14px 18px;
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: var(--r-lg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  cursor: pointer; user-select: none;
  transition: border-color .2s;
}
.city-header:hover { border-color: var(--border2); }
.city-dot {
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--teal); flex-shrink: 0;
  box-shadow: 0 0 10px rgba(0,212,170,0.5);
}
.city-name { font-family: var(--font-display); font-size: 17px; font-weight: 700; color: var(--text); flex: 1; }
.city-nights { font-size: 12px; color: var(--muted); }
.city-chevron { color: var(--muted); transition: transform .2s; }
.city-chevron.open { transform: rotate(180deg); }

/* timeline spine */
.city-days { padding-left: 18px; border-left: 1px solid var(--border2); margin-left: 5px; }
.day-group { margin-bottom: 28px; position: relative; }
.day-group::before {
  content: ''; position: absolute; left: -22px; top: 10px;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--surface2); border: 2px solid var(--border2);
}
.day-label {
  font-family: var(--font-display); font-size: 12px; font-weight: 600; color: var(--accent);
  text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px;
}
.day-activities { display: flex; flex-direction: column; gap: 10px; }

/* activity card */
.activity-card {
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: var(--r-md); padding: 14px 16px;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  display: flex; align-items: flex-start; gap: 14px;
  transition: border-color .18s, transform .18s;
  cursor: default;
}
.activity-card:hover { border-color: var(--border2); transform: translateX(2px); }
.activity-type-icon {
  width: 38px; height: 38px; border-radius: var(--r-sm); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 18px;
}
.icon-food { background: rgba(245,166,35,0.1); }
.icon-sight { background: rgba(0,212,170,0.1); }
.icon-transit { background: rgba(107,114,144,0.12); }
.icon-hotel { background: rgba(255,107,53,0.1); }
.icon-activity { background: rgba(200,100,255,0.1); }
.activity-info { flex: 1; min-width: 0; }
.activity-name {
  font-weight: 500; font-size: 14px; color: var(--text); margin-bottom: 3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.activity-detail { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.activity-time { color: var(--teal); font-size: 12px; font-weight: 500; }
.activity-cost { color: var(--accent); font-size: 12px; font-weight: 500; }
.activity-note { font-size: 12px; color: var(--muted); font-style: italic; margin-top: 4px; }
.owner-actions { display: flex; gap: 6px; opacity: 0; transition: opacity .15s; }
.activity-card:hover .owner-actions { opacity: 1; }
.icon-btn {
  width: 26px; height: 26px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--surface3); display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--muted); transition: all .15s;
}
.icon-btn:hover { border-color: var(--border2); color: var(--text); }
.icon-btn svg { width: 12px; height: 12px; }

/* add activity */
.add-activity-row {
  display: flex; align-items: center; gap: 10px; padding: 10px 14px;
  border: 1px dashed rgba(255,255,255,0.1); border-radius: var(--r-md);
  cursor: pointer; color: var(--muted); font-size: 13px;
  transition: all .15s;
}
.add-activity-row:hover { border-color: rgba(0,212,170,0.3); color: var(--teal); }
.add-activity-row svg { width: 15px; height: 15px; }

/* ===== SIDEBAR ===== */
.sidebar { display: flex; flex-direction: column; gap: 20px; }

.sidebar-card {
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: var(--r-lg); padding: 20px;
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
}
.sidebar-card-title {
  font-family: var(--font-display); font-size: 13px; font-weight: 600;
  color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 16px;
}

/* budget */
.budget-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
.budget-row:last-child { border-bottom: none; }
.budget-cat { font-size: 13px; color: var(--muted); }
.budget-amt { font-size: 13px; font-weight: 500; color: var(--text); }
.budget-total-row { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border2); display: flex; justify-content: space-between; align-items: center; }
.budget-total-label { font-size: 13px; font-weight: 600; color: var(--text); }
.budget-total-amt { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--accent); }
.budget-bar-wrap { height: 4px; background: var(--surface3); border-radius: 4px; margin: 6px 0 2px; overflow: hidden; }
.budget-bar { height: 100%; border-radius: 4px; }

/* route viz */
.route-viz { position: relative; }
.route-stops { display: flex; flex-direction: column; gap: 0; }
.route-stop { display: flex; align-items: flex-start; gap: 12px; position: relative; }
.route-stop-line {
  display: flex; flex-direction: column; align-items: center; flex-shrink: 0;
  width: 20px;
}
.route-stop-dot {
  width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--teal);
  background: var(--bg); flex-shrink: 0;
  box-shadow: 0 0 8px rgba(0,212,170,0.3);
}
.route-stop-dot.origin { background: var(--teal); }
.route-stop-dot.dest { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 8px rgba(245,166,35,0.3); }
.route-connector { width: 1px; flex: 1; min-height: 28px; background: linear-gradient(to bottom, var(--teal), rgba(0,212,170,0.2)); margin: 2px 0; }
.route-stop-info { padding: 0 0 20px; }
.route-city { font-size: 14px; font-weight: 500; color: var(--text); }
.route-nights { font-size: 12px; color: var(--muted); margin-top: 2px; }
.route-flight { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 4px; margin: 4px 0 0; }

/* packing / notes */
.check-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.check-item { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--muted); }
.check-box {
  width: 16px; height: 16px; border-radius: 4px; border: 1px solid var(--border2);
  background: var(--surface3); display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; cursor: pointer; transition: all .15s;
}
.check-box.checked { background: var(--teal); border-color: var(--teal); }
.check-box svg { width: 10px; height: 10px; color: #000; display: none; }
.check-box.checked svg { display: block; }

/* copy trip */
.copy-trip-section { text-align: center; padding: 4px 0; }
.copy-trip-desc { font-size: 12px; color: var(--muted); margin-bottom: 12px; line-height: 1.5; }

/* ===== TOAST ===== */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--r-md);
  padding: 12px 20px; font-size: 13px; color: var(--text);
  display: flex; align-items: center; gap: 8px;
  opacity: 0; transition: all .3s; z-index: 9999; white-space: nowrap;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast-icon { color: var(--teal); }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(10,13,20,0.85); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px; opacity: 0; transition: opacity .2s; pointer-events: none;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--r-xl); padding: 28px; width: 100%; max-width: 480px;
  transform: scale(0.96) translateY(12px); transition: transform .2s;
}
.modal-overlay.open .modal { transform: scale(1) translateY(0); }
.modal-title { font-family: var(--font-display); font-size: 18px; font-weight: 700; margin-bottom: 20px; }
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
.form-input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--r-sm); padding: 10px 12px; color: var(--text);
  font-family: var(--font-body); font-size: 14px; outline: none; transition: border-color .15s;
}
.form-input:focus { border-color: rgba(0,212,170,0.4); }
.form-select {
  width: 100%; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--r-sm); padding: 10px 12px; color: var(--text);
  font-family: var(--font-body); font-size: 14px; outline: none;
  -webkit-appearance: none; cursor: pointer;
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }

/* ===== RESPONSIVE ===== */
@media (max-width: 640px) {
  .topnav { padding: 12px 16px; }
  .page-wrapper { padding: 0 16px 60px; }
  .hero { padding: 32px 0 24px; }
  .stats-strip { grid-template-columns: 1fr 1fr; }
  .share-bar { flex-direction: column; align-items: flex-start; }
  .trip-meta-row { flex-direction: column; }
}

/* ===== EDITABLE FIELDS ===== */
[data-editable] { cursor: text; transition: background .15s; border-radius: 4px; }
[data-editable]:hover { background: rgba(255,255,255,0.04); }
[data-editable]:focus { outline: none; background: rgba(0,212,170,0.06); box-shadow: 0 0 0 1px rgba(0,212,170,0.3); border-radius: 4px; }

.owner-only { display: block; }
.public-only { display: none; }
body.public-mode .owner-only { display: none; }
body.public-mode .public-only { display: block; }
body.public-mode [data-editable] { cursor: default; pointer-events: none; }
body.public-mode [data-editable]:hover { background: none; }

/* ===== PULSE ===== */
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
.pulse { animation: pulse 2s infinite; }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; }

<script>
/* ===================================================
   ORBITRIP — PUBLISHED TRIP PAGE
   Architecture: Component-based, localStorage, Django-friendly
   =================================================== */

// ─── DEFAULT TRIP DATA ─────────────────────────────
const DEFAULT_TRIP = {

        {
          label: 'Day 4',
          activities: [
            { name: 'Train BCN → Paris (Renfe)', type: 'transit', time: '08:30', cost: 95, duration: '6.5 hrs', note: 'Gare de Lyon arrival' },
            { name: 'Check in — Hotel Le Marais', type: 'hotel', time: '17:00', cost: 210, duration: '', note: '' },
            { name: 'Dinner at Café de Flore', type: 'food', time: '20:30', cost: 55, duration: '2 hrs', note: 'Reserve in advance' },
          ]
        },
        {
          label: 'Day 5',
          activities: [
            { name: 'Eiffel Tower', type: 'sight', time: '09:00', cost: 28, duration: '2 hrs', note: 'Top floor tickets' },
            { name: 'Musée du Louvre', type: 'sight', time: '13:00', cost: 17, duration: '3 hrs', note: 'Focus on Denon Wing' },
            { name: 'Seine River Cruise', type: 'activity', time: '19:00', cost: 22, duration: '1 hr', note: '' },
          ]
        }
      ]
    }
  ],
  notes: [
    { text: 'Book Barcelona airport transfer', done: false },
    { text: 'Get travel insurance', done: true },
    { text: 'Download Google Maps offline', done: false },
    { text: 'Check visa requirements', done: true },
  ]
};

// ─── STATE ────────────────────────────────────────
const STORAGE_KEY = 'orbitrip_trip_v2';
let tripData = {};
let isOwner = true; // toggleable

// ─── UTILS ────────────────────────────────────────
const $ = id => document.getElementById(id);
const el = (tag, attrs = {}, ...children) => {
  const e = document.createElement(tag);
  Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'class') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else e.setAttribute(k, v);
  });
  children.flat().forEach(c => e.append(c instanceof Node ? c : document.createTextNode(c)));
  return e;
};

function showToast(msg, icon = '✓') {
  const toast = $('toast');
  $('toastMsg').textContent = msg;
  toast.querySelector('.toast-icon').textContent = icon;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2800);
}

function saveToStorage() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tripData)); } catch(e) {}
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

// ─── COMPUTED STATS ───────────────────────────────
function computeStats() {
  let totalDays = 0, totalActivities = 0, totalSpend = 0;
  (tripData.cities || []).forEach(city => {
    totalDays += (city.nights || 0);
    (city.days || []).forEach(day => {
      (day.activities || []).forEach(act => {
        totalActivities++;
        totalSpend += Number(act.cost || 0);
      });
    });
  });
  return { totalDays, totalActivities, totalSpend, cities: (tripData.cities || []).length };
}

function computeBudgetByCategory() {
  const cats = { food: 0, sight: 0, transit: 0, hotel: 0, activity: 0 };
  (tripData.cities || []).forEach(city => (city.days || []).forEach(day => (day.activities || []).forEach(act => {
    cats[act.type] = (cats[act.type] || 0) + Number(act.cost || 0);
  })));
  return cats;
}

// ─── ICONS ───────────────────────────────────────
const TYPE_META = {
  food:     { icon: '🍽', cls: 'icon-food', label: 'Food & Drink' },
  sight:    { icon: '🏛', cls: 'icon-sight', label: 'Sightseeing' },
  transit:  { icon: '✈', cls: 'icon-transit', label: 'Transit' },
  hotel:    { icon: '🏨', cls: 'icon-hotel', label: 'Accommodation' },
  activity: { icon: '🎭', cls: 'icon-activity', label: 'Activity' },
};

const SVG_EDIT = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
const SVG_TRASH = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>`;
const SVG_PLANE = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><path d="M17.8 19.2L16 11l3.5-3.5C21 6 21 4 19.5 2.5S18 1 16.5 2.5L13 6 4.8 4.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 5.8 5.3c.4.4.9.4 1.3.3l.5-.3c.4-.2.6-.6.5-1.1z"/></svg>`;

// ─── RENDER STATS STRIP ───────────────────────────
function renderStats() {
  const { totalDays, totalActivities, totalSpend, cities } = computeStats();
  const start = tripData.startDate ? new Date(tripData.startDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
  $('statsStrip').innerHTML = `
    <div class="stat-card">
      <div class="stat-icon">🗺</div>
      <div class="stat-label">Cities</div>
      <div class="stat-value">${cities}</div>
      <div class="stat-sub">${(tripData.cities||[]).map(c=>c.name).join(', ') || '—'}</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">📅</div>
      <div class="stat-label">Duration</div>
      <div class="stat-value">${totalDays}<span style="font-size:14px;color:var(--muted)"> nights</span></div>
      <div class="stat-sub">From ${start}</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">📍</div>
      <div class="stat-label">Activities</div>
      <div class="stat-value">${totalActivities}</div>
      <div class="stat-sub">planned</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">💰</div>
      <div class="stat-label">Est. Spend</div>
      <div class="stat-value">$${totalSpend.toLocaleString()}</div>
      <div class="stat-sub">of $${Number(tripData.budget||0).toLocaleString()} budget</div>
    </div>
  `;
}

// ─── RENDER TIMELINE ──────────────────────────────
function renderTimeline() {
  const root = $('timelineRoot');
  root.innerHTML = '';
  (tripData.cities || []).forEach((city, ci) => {
    root.appendChild(renderCityGroup(city, ci));
  });
}

function renderCityGroup(city, ci) {
  const wrap = document.createElement('div');
  wrap.className = 'city-group';
  wrap.dataset.ci = ci;

  const chevronSvg = `<svg class="city-chevron ${city.collapsed?'':'open'}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;flex-shrink:0"><polyline points="6 9 12 15 18 9"/></svg>`;
  const header = document.createElement('div');
  header.className = 'city-header';
  header.innerHTML = `
    <div class="city-dot"></div>
    <span class="city-name">${city.emoji || ''} ${city.name || 'City'}</span>
    <span class="city-nights">${city.nights || 0} nights</span>
    ${isOwner ? `<button class="icon-btn owner-only" data-action="delete-city" data-ci="${ci}" title="Remove city" style="margin-left:auto">${SVG_TRASH}</button>` : ''}
    ${chevronSvg}
  `;
  header.addEventListener('click', e => {
    if (e.target.closest('[data-action]')) return;
    city.collapsed = !city.collapsed;
    saveToStorage();
    renderTimeline();
  });

  const daysWrap = document.createElement('div');
  daysWrap.className = 'city-days';
  daysWrap.style.display = city.collapsed ? 'none' : 'block';

  (city.days || []).forEach((day, di) => {
    const dayEl = document.createElement('div');
    dayEl.className = 'day-group';

    const dayLabel = document.createElement('div');
    dayLabel.className = 'day-label';
    dayLabel.textContent = day.label || `Day ${di + 1}`;
    dayEl.appendChild(dayLabel);

    const actWrap = document.createElement('div');
    actWrap.className = 'day-activities';
    (day.activities || []).forEach((act, ai) => {
      actWrap.appendChild(renderActivityCard(act, ci, di, ai));
    });

    if (isOwner) {
      const addRow = document.createElement('div');
      addRow.className = 'add-activity-row owner-only';
      addRow.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add activity`;
      addRow.addEventListener('click', () => openActivityModal(null, ci, di));
      actWrap.appendChild(addRow);
    }

    dayEl.appendChild(actWrap);
    daysWrap.appendChild(dayEl);
  });

  if (isOwner) {
    const addDayRow = document.createElement('div');
    addDayRow.className = 'add-activity-row owner-only';
    addDayRow.style.marginTop = '10px';
    addDayRow.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add day`;
    addDayRow.addEventListener('click', () => {
      const dayCount = city.days.length + 1;
      city.days.push({ label: `Day ${dayCount}`, activities: [] });
      saveToStorage();
      renderTimeline();
    });
    daysWrap.appendChild(addDayRow);
  }

  wrap.appendChild(header);
  wrap.appendChild(daysWrap);

  // Delegate city delete
  wrap.addEventListener('click', e => {
    const btn = e.target.closest('[data-action="delete-city"]');
    if (btn) {
      e.stopPropagation();
      const idx = parseInt(btn.dataset.ci);
      if (confirm(`Remove ${tripData.cities[idx].name}?`)) {
        tripData.cities.splice(idx, 1);
        saveToStorage();
        renderAll();
      }
    }
  });

  return wrap;
}

function renderActivityCard(act, ci, di, ai) {
  const meta = TYPE_META[act.type] || TYPE_META.activity;
  const card = document.createElement('div');
  card.className = 'activity-card';
  card.innerHTML = `
    <div class="activity-type-icon ${meta.cls}">${meta.icon}</div>
    <div class="activity-info">
      <div class="activity-name">${act.name || 'Activity'}</div>
      <div class="activity-detail">
        ${act.time ? `<span class="activity-time">⏰ ${act.time}</span>` : ''}
        ${act.duration ? `<span>${act.duration}</span>` : ''}
        ${act.cost > 0 ? `<span class="activity-cost">$${Number(act.cost).toLocaleString()}</span>` : '<span style="color:var(--muted);font-size:11px">Free</span>'}
      </div>
      ${act.note ? `<div class="activity-note">${act.note}</div>` : ''}
    </div>
    ${isOwner ? `<div class="owner-actions">
      <button class="icon-btn" data-action="edit-activity" title="Edit">${SVG_EDIT}</button>
      <button class="icon-btn" data-action="delete-activity" title="Delete">${SVG_TRASH}</button>
    </div>` : ''}
  `;
  if (isOwner) {
    card.querySelector('[data-action="edit-activity"]')?.addEventListener('click', () => openActivityModal(act, ci, di, ai));
    card.querySelector('[data-action="delete-activity"]')?.addEventListener('click', () => {
      if (confirm('Remove this activity?')) {
        tripData.cities[ci].days[di].activities.splice(ai, 1);
        saveToStorage();
        renderAll();
      }
    });
  }
  return card;
}

// ─── RENDER ROUTE ─────────────────────────────────
function renderRoute() {
  const stops = $('routeStops');
  stops.innerHTML = '';
  const cities = tripData.cities || [];
  cities.forEach((city, i) => {
    const isFirst = i === 0;
    const isLast = i === cities.length - 1;
    const stopDiv = document.createElement('div');
    stopDiv.className = 'route-stop';
    const dotClass = isFirst ? 'origin' : isLast ? 'dest' : '';
    stopDiv.innerHTML = `
      <div class="route-stop-line">
        <div class="route-stop-dot ${dotClass}"></div>
        ${!isLast ? '<div class="route-connector"></div>' : ''}
      </div>
      <div class="route-stop-info">
        <div class="route-city">${city.emoji || ''} ${city.name}</div>
        <div class="route-nights">${city.nights} nights · ${city.country || ''}</div>
        ${!isLast ? `<div class="route-flight">${SVG_PLANE} → ${cities[i+1].name}</div>` : ''}
      </div>
    `;
    stops.appendChild(stopDiv);
  });
}

// ─── RENDER BUDGET ────────────────────────────────
function renderBudget() {
  const cats = computeBudgetByCategory();
  const { totalSpend } = computeStats();
  const budget = Number(tripData.budget || 0);
  const labels = { food: '🍽 Food', sight: '🏛 Sights', transit: '✈ Transit', hotel: '🏨 Stays', activity: '🎭 Activities' };
  const colors = { food: 'var(--accent)', sight: 'var(--teal)', transit: 'var(--muted)', hotel: 'var(--accent2)', activity: '#b48aff' };

  let html = '';
  Object.entries(cats).forEach(([k, v]) => {
    if (!v) return;
    const pct = budget > 0 ? Math.min(100, (v / budget * 100)).toFixed(0) : 0;
    html += `
      <div class="budget-row">
        <span class="budget-cat">${labels[k]}</span>
        <span class="budget-amt">$${v.toLocaleString()}</span>
      </div>
      <div class="budget-bar-wrap"><div class="budget-bar" style="width:${pct}%;background:${colors[k]}"></div></div>
    `;
  });
  const pctTotal = budget > 0 ? Math.min(100, (totalSpend / budget * 100)).toFixed(0) : 0;
  html += `
    <div class="budget-total-row">
      <div>
        <div class="budget-total-label">Total Spent</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">${pctTotal}% of $${budget.toLocaleString()} budget</div>
      </div>
      <div class="budget-total-amt">$${totalSpend.toLocaleString()}</div>
    </div>
  `;
  $('budgetRows').innerHTML = html;
}

// ─── RENDER NOTES ─────────────────────────────────
function renderNotes() {
  const list = $('checkList');
  list.innerHTML = '';
  (tripData.notes || []).forEach((note, i) => {
    const li = document.createElement('li');
    li.className = 'check-item';
    const box = document.createElement('div');
    box.className = 'check-box' + (note.done ? ' checked' : '');
    box.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`;
    box.addEventListener('click', () => {
      if (!isOwner) return;
      tripData.notes[i].done = !tripData.notes[i].done;
      saveToStorage();
      renderNotes();
    });
    const span = document.createElement('span');
    span.textContent = note.text;
    span.style.textDecoration = note.done ? 'line-through' : 'none';
    if (isOwner) {
      const del = document.createElement('span');
      del.textContent = '×';
      del.style.cssText = 'margin-left:auto;cursor:pointer;color:var(--muted2);padding:0 4px';
      del.addEventListener('click', () => {
        tripData.notes.splice(i, 1);
        saveToStorage();
        renderNotes();
      });
      li.append(box, span, del);
    } else {
      li.append(box, span);
    }
    list.appendChild(li);
  });
}

// ─── RENDER TRIP META ─────────────────────────────
function renderMeta() {
  $('tripTitle').textContent = tripData.title || 'My Trip';
  $('tripTagline').textContent = tripData.tagline || 'An adventure worth remembering';
  $('creatorName').textContent = tripData.creator || 'You';
  const initials = (tripData.creator || 'YO').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  $('creatorAvatar').textContent = initials;
  $('tripStatusPill').textContent = `● ${tripData.status || 'Planning'}`;
  $('coverPlaceholder').textContent = tripData.coverEmoji || '🌍';

  const shareUrl = `${location.origin}/trips/${tripData.id}`;
  $('shareUrl').value = shareUrl;
  const encoded = encodeURIComponent(shareUrl);
  const text = encodeURIComponent(`Check out my trip: ${tripData.title}`);
  $('shareTwitter').href = `https://twitter.com/intent/tweet?text=${text}&url=${encoded}`;
  $('shareWhatsapp').href = `https://wa.me/?text=${text}%20${encoded}`;
  $('shareFacebook').href = `https://www.facebook.com/sharer/sharer.php?u=${encoded}`;
}

// ─── RENDER ALL ───────────────────────────────────
function renderAll() {
  renderMeta();
  renderStats();
  renderTimeline();
  renderRoute();
  renderBudget();
  renderNotes();
}

// ─── MODE TOGGLE ──────────────────────────────────
$('modeToggle').addEventListener('change', e => {
  isOwner = !e.target.checked;
  document.body.classList.toggle('public-mode', !isOwner);
  const badge = $('modeBadge');
  badge.className = 'mode-badge ' + (isOwner ? 'owner' : 'public');
  $('modeLabel').textContent = isOwner ? 'Owner Mode' : 'Public View';
  renderTimeline();
  renderNotes();
});

// ─── ACTIVITY MODAL ───────────────────────────────
function openActivityModal(act, ci, di, ai = null) {
  $('editCityIndex').value = ci;
  $('editDayIndex').value = di;
  $('editActivityIndex').value = ai !== null ? ai : '';
  $('modalTitle').textContent = act ? 'Edit Activity' : 'Add Activity';
  $('activityName').value = act?.name || '';
  $('activityType').value = act?.type || 'food';
  $('activityTime').value = act?.time || '';
  $('activityCost').value = act?.cost || '';
  $('activityDuration').value = act?.duration || '';
  $('activityNote').value = act?.note || '';
  $('activityModal').classList.add('open');
  setTimeout(() => $('activityName').focus(), 100);
}

$('saveActivity').addEventListener('click', () => {
  const ci = parseInt($('editCityIndex').value);
  const di = parseInt($('editDayIndex').value);
  const ai = $('editActivityIndex').value !== '' ? parseInt($('editActivityIndex').value) : null;
  const act = {
    name: $('activityName').value.trim() || 'Activity',
    type: $('activityType').value,
    time: $('activityTime').value,
    cost: Number($('activityCost').value) || 0,
    duration: $('activityDuration').value.trim(),
    note: $('activityNote').value.trim(),
  };
  if (ai !== null) {
    tripData.cities[ci].days[di].activities[ai] = act;
  } else {
    tripData.cities[ci].days[di].activities.push(act);
  }
  saveToStorage();
  renderAll();
  $('activityModal').classList.remove('open');
  showToast(ai !== null ? 'Activity updated' : 'Activity added');
});
$('cancelActivity').addEventListener('click', () => $('activityModal').classList.remove('open'));

// ─── CITY MODAL ───────────────────────────────────
$('addCityBtn').addEventListener('click', () => {
  $('cityName').value = ''; $('cityCountry').value = '';
  $('cityNights').value = ''; $('cityArrival').value = ''; $('cityEmoji').value = '';
  $('cityModal').classList.add('open');
  setTimeout(() => $('cityName').focus(), 100);
});
$('saveCity').addEventListener('click', () => {
  const name = $('cityName').value.trim();
  if (!name) { $('cityName').focus(); return; }
  const nights = parseInt($('cityNights').value) || 1;
  const days = Array.from({ length: nights }, (_, i) => ({
    label: `Day ${(tripData.cities || []).reduce((s, c) => s + (c.days?.length || 0), 0) + i + 1}`,
    activities: []
  }));
  tripData.cities = tripData.cities || [];
  tripData.cities.push({
    name, country: $('cityCountry').value.trim(), emoji: $('cityEmoji').value.trim() || '📍',
    nights, arrival: $('cityArrival').value, collapsed: false, days
  });
  saveToStorage();
  renderAll();
  $('cityModal').classList.remove('open');
  showToast(`${name} added!`);
});
$('cancelCity').addEventListener('click', () => $('cityModal').classList.remove('open'));

// ─── SETTINGS MODAL (via clicking meta info) ──────
function openSettings() {
  $('settingCreator').value = tripData.creator || '';
  $('settingStart').value = tripData.startDate || '';
  $('settingBudget').value = tripData.budget || '';
  $('settingStatus').value = tripData.status || 'Planning';
  $('settingsModal').classList.add('open');
  setTimeout(() => $('settingCreator').focus(), 100);
}
$('saveSettings').addEventListener('click', () => {
  tripData.creator = $('settingCreator').value.trim() || 'You';
  tripData.startDate = $('settingStart').value;
  tripData.budget = Number($('settingBudget').value) || 0;
  tripData.status = $('settingStatus').value;
  saveToStorage();
  renderAll();
  $('settingsModal').classList.remove('open');
  showToast('Trip settings saved');
});
$('cancelSettings').addEventListener('click', () => $('settingsModal').classList.remove('open'));

// Inline editable fields
['tripTitle','tripTagline'].forEach(id => {
  const el = $(id);
  el.addEventListener('blur', () => {
    if (!isOwner) return;
    if (id === 'tripTitle') tripData.title = el.textContent.trim() || 'My Trip';
    if (id === 'tripTagline') tripData.tagline = el.textContent.trim();
    saveToStorage();
    renderMeta();
  });
  el.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
  });
});

// ─── TOP BUTTONS ──────────────────────────────────
$('saveTripBtn').addEventListener('click', () => {
  saveToStorage();
  showToast('Trip saved!');
});

$('copyTripBtn').addEventListener('click', copyTrip);
$('copyTripSidebar')?.addEventListener('click', copyTrip);
function copyTrip() {
  const newId = 'trip_' + Math.random().toString(36).slice(2, 10);
  const copy = JSON.parse(JSON.stringify(tripData));
  copy.id = newId;
  copy.title = copy.title + ' (Copy)';
  copy.creator = 'You';
  localStorage.setItem('orbitrip_trip_copy_' + newId, JSON.stringify(copy));
  showToast('Trip copied to your account!', '✈');
}

$('copyUrlBtn').addEventListener('click', () => {
  const url = $('shareUrl').value;
  navigator.clipboard?.writeText(url).then(() => showToast('Link copied!')).catch(() => {
    $('shareUrl').select();
    showToast('Link copied!');
  });
});

$('addNoteBtn')?.addEventListener('click', () => {
  const text = prompt('Enter note:');
  if (text?.trim()) {
    tripData.notes = tripData.notes || [];
    tripData.notes.push({ text: text.trim(), done: false });
    saveToStorage();
    renderNotes();
  }
});

// Close modals on overlay click
['activityModal','cityModal','settingsModal'].forEach(id => {
  $(id).addEventListener('click', e => {
    if (e.target === $(id)) $(id).classList.remove('open');
  });
});

// Settings on creator click
$('creatorAvatar').addEventListener('click', () => { if (isOwner) openSettings(); });
$('creatorName').addEventListener('click', () => { if (isOwner) openSettings(); });
$('tripStatusPill').addEventListener('click', () => { if (isOwner) openSettings(); });

// Cover emoji change
$('changeCoverBtn').addEventListener('click', () => {
  const emojis = ['🌍','🏔','🏖','🌆','🗺','🌄','🏰','🌊','🌅','🎡','🗼','🌴'];
  const cur = emojis.indexOf(tripData.coverEmoji || '🌍');
  tripData.coverEmoji = emojis[(cur + 1) % emojis.length];
  saveToStorage();
  renderMeta();
});

// ─── INIT ─────────────────────────────────────────
(function init() {
  const stored = loadFromStorage();
  tripData = stored || JSON.parse(JSON.stringify(DEFAULT_TRIP));
  if (!stored) saveToStorage();
  renderAll();

  // Check URL param for public mode
  const params = new URLSearchParams(location.search);
  if (params.get('public') === '1') {
    $('modeToggle').checked = true;
    isOwner = false;
    document.body.classList.add('public-mode');
    $('modeBadge').className = 'mode-badge public';
    $('modeLabel').textContent = 'Public View';
    renderTimeline();
    renderNotes();
  }
})();
</script>
</body>
</html>
